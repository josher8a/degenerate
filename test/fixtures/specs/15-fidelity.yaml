openapi: "3.1.0"
info:
  title: Fidelity Test
  version: "1.0.0"

paths:
  /test:
    get:
      operationId: getTest
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BasicObject"

  /events:
    get:
      operationId: streamEvents
      responses:
        "200":
          description: SSE stream of BasicObject events
          content:
            text/event-stream:
              schema:
                type: string
              itemSchema:
                $ref: "#/components/schemas/BasicObject"

  /lines:
    get:
      operationId: streamLines
      responses:
        "200":
          description: JSONL stream with inline event type
          content:
            application/x-ndjson:
              itemSchema:
                type: object
                properties:
                  seq:
                    type: integer
                  data:
                    type: string

components:
  schemas:
    # ─── Required + Nullable combinations ────────────────────
    BasicObject:
      type: object
      required: [reqNonNull, reqNullable, reqWithDefault]
      properties:
        reqNonNull:
          type: string
          description: Required and non-nullable (the common case).
        reqNullable:
          type: ["string", "null"]
          description: Required but accepts null.
        optNonNull:
          type: string
          description: Optional, non-nullable when present.
        optNullable:
          type: ["string", "null"]
          description: Optional and nullable.
        reqWithDefault:
          type: string
          default: "hello"
          description: Required with a default value.
        optWithDefault:
          type: integer
          default: 42
          description: Optional with a default value.

    # ─── Enum types ──────────────────────────────────────────
    StringEnum:
      type: string
      enum: [active, inactive, pending]
      default: active

    IntEnum:
      type: integer
      enum: [0, 1, 2, 3]

    # ─── Format mappings ─────────────────────────────────────
    FormatTypes:
      type: object
      required: [createdAt, website, data]
      properties:
        createdAt:
          type: string
          format: date-time
        website:
          type: string
          format: uri
        avatar:
          type: string
          format: byte
        trackingId:
          type: string
          format: uuid
        email:
          type: string
          format: email

    # ─── Nested nullable ─────────────────────────────────────
    NestedNullable:
      type: object
      required: [tags, scores, nullableList]
      properties:
        tags:
          type: array
          items:
            type: string
          description: Non-nullable list of non-nullable strings.
        scores:
          type: array
          items:
            type: ["integer", "null"]
          description: Non-nullable list of nullable ints.
        nullableList:
          type: ["array", "null"]
          items:
            type: string
          description: Nullable list of non-nullable strings.
        optionalList:
          type: array
          items:
            type: string
          description: Optional list (not required, not nullable).

    # ─── Constraints ─────────────────────────────────────────
    Constrained:
      type: object
      required: [name, age, items]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          pattern: "^[a-zA-Z]"
        age:
          type: integer
          minimum: 0
          maximum: 150
        score:
          type: number
          exclusiveMinimum: 0
          exclusiveMaximum: 1
          multipleOf: 0.01
        items:
          type: array
          minItems: 1
          maxItems: 50

    # ─── AllOf composition ───────────────────────────────────
    BaseModel:
      type: object
      required: [id]
      properties:
        id:
          type: string
        createdAt:
          type: string
          format: date-time

    ExtendedModel:
      allOf:
        - $ref: "#/components/schemas/BaseModel"
        - type: object
          required: [name, email]
          properties:
            name:
              type: string
            email:
              type: string
              format: email

    # ─── AllOf with nullable sub-schema ──────────────────────
    NullableComposition:
      type: ["object", "null"]
      allOf:
        - $ref: "#/components/schemas/BaseModel"
        - type: object
          properties:
            extra:
              type: string

    # ─── Default values ──────────────────────────────────────
    Defaults:
      type: object
      properties:
        enabled:
          type: boolean
          default: true
        count:
          type: integer
          default: 10
        label:
          type: string
          default: "unnamed"
        status:
          $ref: "#/components/schemas/StringEnum"
        tags:
          type: array
          items:
            type: string
          default: []

    # ─── Description preservation ────────────────────────────
    Documented:
      type: object
      description: A well-documented type.
      properties:
        field1:
          type: string
          description: First field description.
        field2:
          type: integer
          description: Second field description.

    # ─── Map / additionalProperties ──────────────────────────
    Metadata:
      type: object
      properties:
        name:
          type: string
      additionalProperties:
        type: string

    TypedMap:
      type: object
      additionalProperties:
        $ref: "#/components/schemas/BasicObject"

    # ─── Adversarial field names ─────────────────────────────
    AdversarialKeys:
      type: object
      properties:
        "it's":
          type: string
        'key"with"quotes':
          type: string
        "$dollar":
          type: string
        "back\\slash":
          type: string

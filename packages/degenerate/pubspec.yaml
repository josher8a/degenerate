name: degenerate
description: Generate typesafe Dart API clients from OpenAPI 3.x specs. Produces idiomatic models, serialization, and HTTP clients with pluggable adapters.
version: 0.4.2
repository: https://github.com/blopker/degenerate
resolution: workspace

executables:
  degenerate: degenerate

topics:
  - openapi
  - codegen
  - swagger
  - rest
  - api-client

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

environment:
  sdk: ^3.11.1

dependencies:
  args: ^2.7.0
  code_builder: ^4.10.0
  collection: ^1.19.0
  meta: ^1.16.0
  path: ^1.9.0
  yaml: ^3.1.0
